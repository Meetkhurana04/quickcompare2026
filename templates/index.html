<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QuickCompare - Price Comparison Made Easy</title>
    <style>
        :root{
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.16);
            --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            --text: #e9ecf1;
            --muted: #a8b1c2;
            --accent1: #8b5cf6;
            --accent2: #60a5fa;
            --nav-h: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: var(--text);
            min-height: 100vh;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: hidden;
            position: relative;
        }

        body.searched {
            height: auto;
            overflow-y: auto;
        }

        .gradient-bg {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 70%;
            height: 120%;
            background: radial-gradient(
                circle at 80% 30%,
                rgba(147, 51, 234, 0.25) 0%,
                rgba(59, 130, 246, 0.18) 25%,
                rgba(147, 51, 234, 0.06) 50%,
                transparent 70%
            );
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:1} }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            filter: blur(0.5px);
        }
        .shooting-star {
            position: absolute;
            width: 120px; height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
            transform: rotate(-25deg);
            opacity: 0;
            animation: shoot 2.2s ease-in-out forwards;
        }
        @keyframes shoot {
            0% { opacity: 0; transform: translate3d(0,0,0) rotate(-25deg); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translate3d(-60vw, 40vh, 0) rotate(-25deg); }
        }

        .background-text {
            position: fixed;
            opacity: 0.7;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(64px, 8vw, 240px);
            font-weight: 800;
            letter-spacing: 10px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            color: transparent;
            background: linear-gradient(
                to right,
                rgba(40, 40, 40, 0.5) 0%,
                rgba(80, 80, 80, 0.8) 50%,
                rgba(147, 51, 234, 0.35) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow:
                0 0 40px rgba(147, 51, 234, 0.08),
                0 0 80px rgba(147, 51, 234, 0.04);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(18px);
            -webkit-backdrop-filter: saturate(180%) blur(18px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 1rem 2rem;
    background: rgba(15, 17, 25, 0.6);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(16px);
    box-shadow: 0 0 20px rgba(96, 165, 250, 0.15);
    overflow: hidden;
}
.navbar::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, #a78bfa, #60a5fa, #a78bfa);
    animation: moveLine 6s linear infinite;
    opacity: 0.6;
}
@keyframes moveLine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}
.navbar h1 {
    font-size: 1.5rem;
    font-weight: 800;
    font-family: "Orbitron", "Poppins", sans-serif;
    background: linear-gradient(90deg, #c084fc 0%, #60a5fa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 15px rgba(147, 51, 234, 0.4),
                 0 0 25px rgba(96, 165, 250, 0.3);
    letter-spacing: 1px;
    animation: pulseGlow 3s ease-in-out infinite;
}

@keyframes pulseGlow {
    0%, 100% {
        text-shadow: 0 0 10px rgba(147, 51, 234, 0.4),
                     0 0 20px rgba(96, 165, 250, 0.3);
    }
    50% {
        text-shadow: 0 0 20px rgba(147, 51, 234, 0.6),
                     0 0 35px rgba(96, 165, 250, 0.4);
    }
}


        .container {
            position: relative;
            z-index: 2;
            max-width: 1850px;
            margin-right: 10vw;
            margin-left: 10vw;
            margin-top: -80px;
            padding: 2rem 1rem;
            min-height: calc(100vh - var(--nav-h));
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .container.searched {
            justify-content: flex-start;
            padding-top: 2rem;
            min-height: auto;
        }

       .hero {
    text-align: center;
    margin-bottom: 1rem;
    position: relative;
    top: -30px;
}

.hero.compact {
    margin-bottom: -1.05rem;
    top: 0; /* Reset the manual offset */
    opacity: 0;
    transform: translateY(-20px);
    height: 0;
    overflow: hidden;
    transition: all 0.4s ease;
}


.hero h2 {
    font-size: clamp(2rem, 2vw, 3rem);
    font-weight: 700;
    color: #fff;
    text-shadow:
        0 0 8px rgba(102, 126, 234, 0.7),
        0 0 16px rgba(167, 139, 250, 0.6),
        0 0 32px rgba(102, 126, 234, 0.3);
    letter-spacing: 0.8px;
    animation: pulseGlow 3s infinite ease-in-out;
}

.hero p {
    font-size: 1.05rem;
    color: rgba(180, 190, 210, 0.8);
    text-shadow: 0 0 6px rgba(102, 126, 234, 0.3);
}

@keyframes pulseGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(167, 139, 250, 0.7); }
    50% { text-shadow: 0 0 25px rgba(102, 126, 234, 0.9); }
}


        .search-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: -10px;
        }

        .search-wrapper.compact {
            position: sticky;
            top: calc(var(--nav-h) + 8px);
            z-index: 90;
            flex-direction: row;
            gap: 0.6rem;
            margin-bottom: 7rem;
        }

        .search-item {
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 17, 25, 0.5);
            backdrop-filter: saturate(180%) blur(18px);
            -webkit-backdrop-filter: saturate(180%) blur(18px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            flex: 1;
        }

        .search-wrapper.compact .search-item {
            padding: 0.6rem 0.85rem;
            border-radius: 12px;
        }

        .search-wrapper.compact .search-item:first-child {
            flex: 0 0 auto;
            min-width: 200px;
        }

        .search-wrapper.compact .search-item:nth-child(2) {
            flex: 1;
        }

        .input-group {
            transition: all 0.3s ease;
            
            
            
        }

.input-group label {
    display: block;
    font-family: 'Orbitron', 'Poppins', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: #c084fc;
    margin-left: 48%;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-top: -4px;
    margin-bottom: 0.9rem;
    text-shadow: 0 0 10px rgba(147, 51, 234, 0.6), 0 0 20px rgba(147, 51, 234, 0.4);
    transition: text-shadow 0.3s ease, transform 0.3s ease;
}

.input-group label:hover {
    text-shadow: 0 0 15px rgba(147, 51, 234, 0.9);
    transform: scale(1.05);
}


        .search-wrapper.compact .input-group label {
            opacity: 0;
            max-height: 0;
            margin-bottom: 0;
            overflow: hidden;
        }

        .location-display {
            border-radius: 12px;
            padding: 0.85rem 0.9rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
        }

        .search-wrapper.compact .location-display {
            padding: 0.55rem 0.7rem;
            font-size: 0.85rem;
            border-radius: 10px;
        }

        .location-display:hover {
            border-color: rgba(102, 126, 234, 0.6);
            background: rgba(255,255,255,0.08);
        }
        .location-display.selected { background: rgba(99, 102, 241, 0.08); }
        .location-text { color: #9aa3b2; }
        .location-text.selected { color: var(--text); font-weight: 600; }

        .change-btn {
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 0.85rem 2rem;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    white-space: nowrap;
        }

        .search-wrapper.compact .change-btn {
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
            border-radius: 6px;
        }

        .change-btn:hover { transform: translateY(-2px); }

        .search-input-row {
            display: flex;
            gap: 0.7rem;
            align-items: flex-end;
            transition: all 0.3s ease;
        }

        .search-wrapper.compact .search-input-row {
            align-items: center;
            gap: 0.5rem;
        }

        .search-input-row .input-group {
            flex: 1;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--text);
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: saturate(180%) blur(14px);
        }

        .search-wrapper.compact input[type="text"] {
            padding: 0.55rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 10px;
        }

        input[type="text"]::placeholder { color: #9aa3b2; }
        input[type="text"]:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.8);
            box-shadow: 0 0 0 4px rgba(102,126,234,0.18);
            background: rgba(255, 255, 255, 0.08);
        }
        input[type="text"]:disabled {
            background: rgba(255,255,255,0.04);
            color: #8b8f99;
            cursor: not-allowed;
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            white-space: nowrap;
        }

        .search-wrapper.compact .search-btn {
            padding: 0.3rem 0.6rem;
            font-size: 0.85rem;
            border-radius: 10px;
        }

        .search-btn:hover:not(:disabled) { transform: translateY(-2px); }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) {
            .search-wrapper.compact {
                flex-direction: column;
                gap: 0.6rem;
            }

            .search-wrapper.compact .search-item:first-child {
                min-width: auto;
            }
        }

        .modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.25s ease;
        }
        .modal.active {
            display: flex;
            justify-content: center; align-items: center;
        }
        @keyframes fadeIn { from {opacity: 0} to {opacity: 1} }

        .modal-content {
            width: 80%;
            height: 80%;
            max-width: 900px;
            max-height: 700px;
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            animation: slideUp 0.25s ease;
            background: rgba(15, 17, 25, 0.95);
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: saturate(180%) blur(20px);
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h3 { font-size: 1.4rem; color: var(--text); }
        .close-btn {
            background: none; border: none; font-size: 1.8rem; cursor: pointer;
            color: #a9b0be;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }

        .modal-search {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .modal-search input[type="text"] {
            width: 100%;
        }
        .suggestions {
            flex: 1;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
        }
        .suggestion-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: background 0.2s ease;
            color: var(--text);
        }
        .suggestion-item:hover {
            background: rgba(255,255,255,0.12);
        }
        .suggestion-item:last-child { border-bottom: none; }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            animation: fadeIn 0.5s ease;
        }
        @media (max-width: 768px) {
            .results { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
        }
        @media (max-width: 480px) { .results { grid-template-columns: 1fr; } }

        .product-card {
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            backdrop-filter: saturate(180%) blur(14px);
            -webkit-backdrop-filter: saturate(180%) blur(14px);
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            background: rgba(255,255,255,0.08);
        }

        .product-image {
            width: 100%; height: 200px; object-fit: cover;
            background: rgba(255,255,255,0.04);
        }
        .product-image-placeholder {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.08) 100%);
            display: flex; align-items: center; justify-content: center;
            color: #9aa3b2; font-size: 0.9rem;
        }

        .product-info { padding: 1rem; }
        .product-name {
            font-size: 0.98rem; font-weight: 700; color: var(--text);
            margin-bottom: 0.4rem;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            min-height: 40px;
        }
        .product-brand { 
            font-size: 0.82rem; 
            color: var(--muted); 
            margin-bottom: 0.8rem; 
        }

        .source-tags { display: none; }

        .source-tag {
            display: inline-block; 
            padding: 0.25rem 0.5rem; 
            border-radius: 6px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            color: white;
            mix-blend-mode: normal;
        }
        .source-tag.blinkit { background: #f8cb46; color: #333; }
        .source-tag.instamart { background: #f77f00; }
        .source-tag.zepto { background: #e21b70; }
        .source-tag.bigbasket { background: #84c225; }
        .source-tag.flipkartminutes { background: #2874f0; }
        .source-tag.jiomart { background: #0a6eb4; }
        .source-tag.dmart { background: #1c458a; }

        .price-info { 
            border-top: 1px solid rgba(255,255,255,0.08); 
            padding-top: 0.8rem; 
        }
        .variant-row { margin-bottom: 1rem; }
        .variant-label {
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #a5b4fc; 
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }
        .price-row {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0.5rem 0; 
            font-size: 0.86rem;
            gap: 0.5rem;
        }
        .price-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }
        .price-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .price-amount { 
            font-weight: 800; 
            color: #ffffff; 
            letter-spacing: 0.2px; 
        }
        .price-link { 
            text-decoration: none; 
            font-size: 1rem; 
            width: 20px;
            text-align: center;
        }

        .price-link a {
            text-decoration: none;
            color: inherit;
        }

        .crown-icon {
            font-size: 0.9rem;
            margin-left: 0.3rem;
        }

.footer {
    position: fixed;
    bottom: -8px;
    width: 100%;
    font-size: 16px;
    text-align: center;
    height:60px;
    padding: 0.6rem;
    background: rgba(10, 10, 20, 0.7);
    border-top: 1px solid rgba(167, 139, 250, 0.2);
    backdrop-filter: blur(14px) saturate(150%);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    color: rgba(225, 230, 255, 0.9);
    font-family: "Rajdhani", sans-serif;
    font-weight: 500;
    text-shadow: 0 0 12px rgba(147, 51, 234, 0.3);
    animation: glowPulse 6s ease-in-out infinite;
    z-index: 99;
}

@keyframes glowPulse {
    0%, 100% {
        box-shadow: 0 -2px 18px rgba(96, 165, 250, 0.25);
    }
    50% {
        box-shadow: 0 -4px 30px rgba(147, 51, 234, 0.35);
    }
}

.footer strong {
    background: linear-gradient(90deg, #a78bfa, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: footerGlow 3s ease-in-out infinite;
}

@keyframes footerGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(147, 51, 234, 0.4); }
    50% { text-shadow: 0 0 25px rgba(96, 165, 250, 0.5); }
}

        .loading { text-align: center; padding: 3rem; color: var(--text); }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid white;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        .no-results {
            text-align: center; padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(14px);
            color: var(--muted);
        }
        .no-results h3 { margin-bottom: 0.5rem; color: var(--text); }

.credits-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-left: auto;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #a5b4fc;
    white-space: nowrap;
}
.credits-badge i { font-size: 0.7rem; }

.platform-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    animation: fadeIn 0.4s ease;
}
.platform-btn {
    padding: 0.5rem 1.2rem;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
}
.platform-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(167,139,250,0.4);
    transform: translateY(-1px);
}
.platform-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
}
.platform-btn .cost {
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 400;
}

.source-tag.swiggy { background: #f77f00; }
.source-tag.minutes { background: #2874f0; }

@media (max-width: 768px) {
    .credits-badge { font-size: 0.65rem; padding: 0.2rem 0.6rem; }
    .platform-btn { font-size: 0.72rem; padding: 0.4rem 0.8rem; }
}

/* ------------------------------
   📱 Mobile Fix (393x851 & below)
---------------------------------*/
@media (max-width: 430px) {

  body {
    overflow-y: auto;
    overflow-x: hidden;
  }

  body.searched {
    height: auto;
    overflow-y: auto;
  }

  .container {
    margin: 0 auto;
    padding: 1.2rem 0.8rem;
    max-width: 100%;
    min-height: auto;
    top: 80px;
  }

  .container.searched {
    padding-top: 0.8rem;
  }

  .background-text {
    top: 72%;
    font-size: 28px;
    opacity: 0.5;
    letter-spacing: 0em;
  }

  /* Hero - Before Search */
  .hero {
    top: 0;
    margin-bottom: 1.5rem;

  /* Hero - After Search (Completely Hidden) */

  .hero h2 {

}

  /* Search Wrapper - After Search (Compact & Inline) */
  .search-wrapper.compact {
    position: sticky;

    flex-direction: row !important; /* ✅ Force horizontal wrapper */

  /* Each search item should be inline */

  .search-wrapper.compact .search-item:first-child {

  .search-wrapper.compact .search-item:nth-child(2) {

  }

  /* Hide labels in compact */

  /* Each row should be horizontal */
  .search-wrapper.compact .search-input-row {
    display: flex;
    flex-direction: row !important; /* ✅ Force horizontal */
    align-items: center;

  }

  .search-wrapper.compact .input-group {
    flex: 1;

  /* Input fields compact size */

  /* Icon-only buttons */

  .search-wrapper.compact .search-btn {

    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    overflow: hidden;
    text-indent: -9999px; /* Hide text */
    position: relative;

  /* Add icons using ::before */
  .search-wrapper.compact .change-btn::before {
     content: "\f3c5"; /* 📍 Font Awesome 'location-dot' icon */
  font-family: "Font Awesome 6 Free";
  font-weight: 900;

  }

  .search-wrapper.compact .search-btn::before {
     content: "\f002"; /* 🔍 Font Awesome 'search' icon */
  font-family: "Font Awesome 6 Free";
  font-weight: 900;
  text-indent: 0;
  position: absolute;
  }

  /* Normal Search Items (Before Search - Stacked) */
  .search-item {
    padding: 1rem;
    border-radius: 14px;
  }

  .input-group label {

  .search-input-row {

  .search-btn {
    width: 100%;
    font-size: 0.7rem;

  /* ============================================
     PRODUCT CARDS - 2 COLUMNS ON MOBILE
  ============================================ */
  .results {

<body>
    <div class="gradient-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="background-text" id="bgText"></div>

    <div class="navbar glass">
        <h1 onclick="window.location.reload()" style="cursor: pointer;">QuickCompare</h1>
        <span class="credits-badge" id="creditsBadge"><i class="fas fa-bolt"></i> <span id="creditsCount">—</span></span>
    </div>

    <div class="container" id="container">
        <div class="hero" id="hero">
            <h2>Compare Prices Instantly</h2>
            <p>Find the best deals across Blinkit, Instamart, Zepto, BigBasket, and more</p>
        </div>

        <div class="search-wrapper" id="searchWrapper">
          <div class="search-item">
    <div class="search-input-row">
        <div class="input-group">
            <label>Delivery Location</label>
            <div class="location-display" id="locationDisplay" onclick="openLocationModal()">
                <span class="location-text" id="locationText">Select your location</span>
            </div>
        </div>
        <button class="change-btn" onclick="openLocationModal()"><span>Change</span></button>
    </div>
</div>


            <div class="search-item">
                <div class="search-input-row">
                    <div class="input-group">
                        <label>Search Product</label>
                        <input 
                            type="text" 
                            id="productInput" 
                            placeholder="e.g., atta, rice, milk" 
                            disabled
                        >
                    </div>
                    <button class="search-btn" id="searchBtn" onclick="searchProducts()" disabled>
                       <span>Search</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="resultsContainer"></div>
        <div id="platformButtons" class="platform-buttons"></div>
    </div>

    <div class="modal" id="locationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Your Location</h3>
                <button class="close-btn" onclick="closeLocationModal()">&times;</button>
            </div>
            <div class="modal-search">
                <input 
                    type="text" 
                    id="locationSearchInput" 
                    placeholder="Search for your area, sector, or landmark"
                >
                <div class="suggestions" id="locationSuggestions"></div>
            </div>
        </div>
    </div>

    <div class="footer glass">
        <p>Made with ❤️ by <strong>Meet</strong></p>
    </div>

    <script>
    const BACKGROUND_TEXT = '#Support_Local';
    document.getElementById('bgText').textContent = BACKGROUND_TEXT;

    // ═══════════════════════════════════════════
    //  CONFIG — QuickCommerce API
    // ═══════════════════════════════════════════
    const API_BASE = '';

    const ALL_PLATFORMS = ['BlinkIt', 'Zepto', 'Swiggy', 'BigBasket', 'DMart', 'JioMart', 'Minutes'];
    const DEFAULT_PLATFORMS = ['BlinkIt', 'Zepto', 'Swiggy'];
    const CACHE_TTL = 15 * 60 * 1000;

    const PLATFORM_LABELS = {
        BlinkIt: 'Blinkit', Zepto: 'Zepto', Swiggy: 'Instamart',
        BigBasket: 'BigBasket', DMart: 'DMart', JioMart: 'JioMart',
        Minutes: 'Flipkart Minutes'
    };
    const PLATFORM_CSS = {
        BlinkIt: 'blinkit', Zepto: 'zepto', Swiggy: 'swiggy',
        BigBasket: 'bigbasket', DMart: 'dmart', JioMart: 'jiomart',
        Minutes: 'minutes'
    };

    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 220; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        const dur = (2 + Math.random() * 3).toFixed(2);
        const delay = (Math.random() * 2).toFixed(2);
        star.style.animation = `twinkle ${dur}s infinite ${delay}s`;
        const size = Math.random() < 0.2 ? 3 : 2;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        starsContainer.appendChild(star);
    }
    setInterval(() => {
        if (Math.random() < 0.3) {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.top = `${10 + Math.random() * 30}vh`;
            s.style.left = `${70 + Math.random() * 20}vw`;
            starsContainer.appendChild(s);
            setTimeout(() => s.remove(), 2400);
        }
    }, 3500);

    window.addEventListener('load', () => {
        const navH = document.querySelector('.navbar')?.offsetHeight || 64;
        document.documentElement.style.setProperty('--nav-h', navH + 'px');
    });

    let currentLat = 28.4792711;
    let currentLng = 77.00450409999999;
    let currentPin = '122006';
    let locationSelected = false;
    let currentQuery = '';

    function loadSavedLocation() {
        try {
            const saved = localStorage.getItem('quickcompare_location');
            if (saved) {
                const d = JSON.parse(saved);
                currentLat = d.lat; currentLng = d.lng; currentPin = d.pin || '';
                document.getElementById('locationText').textContent = d.name;
                document.getElementById('locationText').classList.add('selected');
                document.getElementById('locationDisplay').classList.add('selected');
                document.querySelector('.change-btn').textContent = 'Change';
                locationSelected = true;
                document.getElementById('productInput').disabled = false;
                document.getElementById('searchBtn').disabled = false;
            }
        } catch (e) { console.error('Load location error:', e); }
    }

    function saveLocation(name, lat, lng, pin) {
        try {
            localStorage.setItem('quickcompare_location', JSON.stringify({ name, lat, lng, pin, timestamp: Date.now() }));
        } catch (e) { console.error('Save location error:', e); }
    }

    window.addEventListener('DOMContentLoaded', () => { loadSavedLocation(); });

    function openLocationModal() {
        document.getElementById('locationModal').classList.add('active');
        document.getElementById('locationSearchInput').focus();
    }

    function closeLocationModal() {
        document.getElementById('locationModal').classList.remove('active');
        document.getElementById('locationSuggestions').innerHTML = '';
    }

    let locationSearchTimeout;
    document.getElementById('locationSearchInput').addEventListener('input', (e) => {
        clearTimeout(locationSearchTimeout);
        const value = e.target.value.trim();
        if (value.length < 2) {
            document.getElementById('locationSuggestions').innerHTML = '';
            return;
        }
        locationSearchTimeout = setTimeout(async () => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(value)}&format=json&limit=6&addressdetails=1`, {
                    headers: { 'Accept-Language': 'en' }
                });
                const data = await res.json();
                showLocationSuggestions(data || []);
            } catch (e) { console.error('Location search error:', e); }
        }, 350);
    });

    function showLocationSuggestions(suggestions) {
        const container = document.getElementById('locationSuggestions');
        container.innerHTML = '';
        suggestions.forEach(s => {
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.textContent = s.display_name;
            item.onclick = () => selectLocation(s);
            container.appendChild(item);
        });
    }

    async function selectLocation(selected) {
        document.getElementById('locationSearchInput').value = selected.display_name;
        currentLat = parseFloat(selected.lat);
        currentLng = parseFloat(selected.lon);
        const parts = selected.display_name.split(',').map(s => s.trim());
        const shortName = parts[0] + ', ' + parts[1];
        const pinMatch = selected.display_name.match(/\b\d{6}\b/);
        currentPin = pinMatch ? pinMatch[0] : '';

        saveLocation(shortName, currentLat, currentLng, currentPin);
        document.getElementById('locationText').textContent = shortName;
        document.getElementById('locationText').classList.add('selected');
        document.getElementById('locationDisplay').classList.add('selected');
        document.querySelector('.change-btn').textContent = 'Change';
        locationSelected = true;
        document.getElementById('productInput').disabled = false;
        document.getElementById('searchBtn').disabled = false;

        setTimeout(() => closeLocationModal(), 300);
    }

    // ═══════════════════════════════════════════
    //  SEARCH — QuickCommerce /v1/groupsearch
    // ═══════════════════════════════════════════
    async function searchProducts() {
        const query = document.getElementById('productInput').value.trim();
        if (!query || !locationSelected) return;

        currentQuery = query;

        document.body.classList.add('searched');
        document.getElementById('container').classList.add('searched');
        document.getElementById('hero').classList.add('compact');
        document.getElementById('searchWrapper').classList.add('compact');
        document.querySelector('.footer').classList.add('visible');
        document.getElementById('platformButtons').innerHTML = '';

        const cacheKey = `qc_${query.toLowerCase()}_${currentLat}_${currentLng}`;
        const cached = getCache(cacheKey);
        if (cached) {
            displayResults(cached, query);
            return;
        }

        document.getElementById('resultsContainer').innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                <p>Searching Blinkit, Zepto & Instamart...</p>
            </div>
        `;

        try {
            const platforms = DEFAULT_PLATFORMS.join(',');
            let url = `${API_BASE}/api/groupsearch?q=${encodeURIComponent(query)}&lat=${currentLat}&lon=${currentLng}&platforms=${platforms}`;
            if (currentPin) url += `&pincode=${currentPin}`;

            const res = await fetch(url);
            if (!res.ok) throw new Error(`API error: ${res.status}`);

            const data = await res.json();
            if (data.status !== 'success') throw new Error(data.status || 'Search failed');

            setCache(cacheKey, data);
            displayResults(data, query);
            fetchCredits();
        } catch (e) {
            console.error('Search error:', e);
            document.getElementById('resultsContainer').innerHTML = `
                <div class="no-results">
                    <h3>Something went wrong</h3>
                    <p>${e.message}</p>
                </div>
            `;
        }
    }

    document.getElementById('productInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchProducts();
    });

    // ═══════════════════════════════════════════
    //  DISPLAY RESULTS — uniform data parsing
    // ═══════════════════════════════════════════
    function displayResults(data, query) {
        const results = data?.data?.results || {};
        const searchedPlatforms = Object.keys(results);
        window.__pcProducts = [];

        Object.entries(results).forEach(([platform, products]) => {
            if (!Array.isArray(products)) return;
            products.forEach(p => {
                window.__pcProducts.push({
                    source: platform,
                    name: p.name || '',
                    brand: p.brand || '',
                    unit: p.quantity || '',
                    price: Number(p.offer_price) || Number(p.mrp) || 0,
                    mrp: Number(p.mrp) || Number(p.offer_price) || 0,
                    image_url: p.images?.[0] || '',
                    out_of_stock: p.available === false,
                    url: p.deeplink || ''
                });
            });
        });

        document.getElementById('resultsContainer').innerHTML = '';
        const groups = groupProducts(window.__pcProducts);
        renderProductCards(groups);
        renderPlatformButtons(searchedPlatforms);
    }

    // ═══════════════════════════════════════════
    //  PLATFORM EXPAND — add platforms 1 at a time
    // ═══════════════════════════════════════════
    function renderPlatformButtons(alreadySearched) {
        const remaining = ALL_PLATFORMS.filter(p => !alreadySearched.includes(p));
        if (remaining.length === 0) {
            document.getElementById('platformButtons').innerHTML = '<p style="color:var(--muted);font-size:0.8rem;">All platforms searched ✓</p>';
            return;
        }

        const html = remaining.map(p => `
            <button class="platform-btn" onclick="expandPlatform('${p}')" id="addBtn-${p}">
                + ${PLATFORM_LABELS[p]} <span class="cost">(1 credit)</span>
            </button>
        `).join('');

        document.getElementById('platformButtons').innerHTML = html;
    }

    async function expandPlatform(platform) {
        const btn = document.getElementById(`addBtn-${platform}`);
        if (btn) btn.disabled = true;

        try {
            let url = `${API_BASE}/api/search?q=${encodeURIComponent(currentQuery)}&lat=${currentLat}&lon=${currentLng}&platform=${platform}`;
            if (currentPin) url += `&pincode=${currentPin}`;

            const res = await fetch(url);
            if (!res.ok) throw new Error(`API error: ${res.status}`);

            const data = await res.json();
            if (data.status !== 'success') throw new Error(data.status);

            const newProducts = data?.data?.products || [];
            newProducts.forEach(p => {
                window.__pcProducts.push({
                    source: platform,
                    name: p.name || '',
                    brand: p.brand || '',
                    unit: p.quantity || '',
                    price: Number(p.offer_price) || Number(p.mrp) || 0,
                    mrp: Number(p.mrp) || Number(p.offer_price) || 0,
                    image_url: p.images?.[0] || '',
                    out_of_stock: p.available === false,
                    url: p.deeplink || ''
                });
            });

            const groups = groupProducts(window.__pcProducts);
            renderProductCards(groups);
            renderPlatformButtons(getAllSearchedPlatforms());
            fetchCredits();
        } catch (e) {
            console.error(`Expand ${platform} error:`, e);
            if (btn) btn.disabled = false;
        }
    }

    function getAllSearchedPlatforms() {
        const searched = new Set();
        window.__pcProducts.forEach(p => searched.add(p.source));
        return [...searched];
    }

    // ═══════════════════════════════════════════
    //  CREDITS — free endpoint, shows remaining
    // ═══════════════════════════════════════════
    async function fetchCredits() {
        try {
            const res = await fetch(`${API_BASE}/api/credits`);
            const data = await res.json();
            const remaining = data?.summary?.total_available ?? '—';
            document.getElementById('creditsCount').textContent = remaining;
        } catch (e) {
            console.error('Credits fetch error:', e);
        }
    }

    // ═══════════════════════════════════════════
    //  CACHE — localStorage with TTL
    // ═══════════════════════════════════════════
    function getCache(key) {
        try {
            const raw = localStorage.getItem(key);
            if (!raw) return null;
            const item = JSON.parse(raw);
            if (Date.now() - item.ts < CACHE_TTL) return item.data;
            localStorage.removeItem(key);
        } catch (e) { /* ignore */ }
        return null;
    }

    function setCache(key, data) {
        try {
            localStorage.setItem(key, JSON.stringify({ data, ts: Date.now() }));
            cleanCache();
        } catch (e) { /* ignore */ }
    }

    function cleanCache() {
        try {
            const prefix = 'qc_';
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k && k.startsWith(prefix)) keys.push(k);
            }
            keys.sort((a, b) => {
                try { return JSON.parse(localStorage.getItem(a)).ts - JSON.parse(localStorage.getItem(b)).ts; }
                catch (e) { return 0; }
            });
            while (keys.length > 50) {
                const old = keys.shift();
                localStorage.removeItem(old);
            }
        } catch (e) { /* ignore */ }
    }

    fetchCredits();

    function groupProducts(products) {
        const groups = {};

        products.forEach(prod => {
            const signature = extractProductSignature(prod.brand, prod.name);
            const cleanedName = cleanProductName(prod.name, prod.brand);

            if (!groups[signature]) {
                groups[signature] = {
                    products: [],
                    sources: new Set(),
                    image: '',
                    displayName: cleanedName,
                    brand: prod.brand,
                    originalNames: [cleanedName]
                };
            }

            groups[signature].products.push(prod);
            groups[signature].sources.add(prod.source);

            if (!groups[signature].image && prod.image_url) {
                groups[signature].image = prod.image_url;
            }

            groups[signature].originalNames.push(cleanedName);
            const longestName = groups[signature].originalNames.reduce((a, b) => 
                a.length > b.length ? a : b
            );
            groups[signature].displayName = longestName;
        });

        return groups;
    }

    function extractProductSignature(brand, productName) {
        const name = (productName || '').toLowerCase().trim();
        const brandKey = (brand || '').toLowerCase().trim() || 'no-brand';

        let core = name
            .replace(brandKey, '')
            .replace(/[\(\)\[\]]/g, ' ')
            .replace(/\d+(\.\d+)?\s*(kg|g|l|ml|pack|pc|piece|litre|liter|pcs|gm)\b/gi, '')
            .replace(/(\d+)\s*(x|×)\s*(\d+)/gi, '')
            .replace(/\b(100%|0%|fresh|premium|classic|original|pure|natural|regular)\b/gi, '')
            .replace(/\s+/g, ' ')
            .trim();

        if (core.length < 3) core = name.replace(/[\(\)\[\]]/g, ' ').replace(/\s+/g, ' ').trim();

        const words = core.split(/\s+/).filter(w => w.length > 1 && !/^\d+(\.\d+)?$/.test(w));
        const sig = words.slice(0, 2).join('-');

        return `${brandKey}__${sig || 'generic'}`;
    }

    function cleanProductName(name, brand) {
        let cleaned = name || '';
        const fluff = [
            /\(100%\s+[^)]*\)/gi,
            /\b0%\s+maida\b/gi,
            /\b100%\s+(wheat|atta|organic|whole)\b/gi,
            /\bfor\s+softer\s+rotis?\b/gi,
            /\|\s*.*/g,
            /\s*\([^)]*\d+\s*(kg|g|l|ml|pack|pc)\s*[^)]*\)\s*/gi,
        ];
        fluff.forEach(p => { cleaned = cleaned.replace(p, ''); });
        return cleaned.replace(/\s+/g, ' ').trim();
    }

    function renderProductCards(groups) {
        const sortedKeys = Object.keys(groups).sort((a, b) => {
            return groups[b].sources.size - groups[a].sources.size;
        });

        if (sortedKeys.length === 0) {
            document.getElementById('resultsContainer').innerHTML = `
                <div class="no-results">
                    <h3>No products found</h3>
                    <p>Try searching for something else</p>
                </div>
            `;
            return;
        }

        const resultsHTML = `<div class="results">${sortedKeys.map(key => {
            const group = groups[key];
            
            const unitGroups = {};
            group.products.forEach(prod => {
                const unitSafe = (prod.unit || 'unit').toString();
                const normalizedUnit = unitSafe.toLowerCase().replace(/\s+/g, ' ').trim();
                if (!unitGroups[normalizedUnit]) unitGroups[normalizedUnit] = [];
                
                const isDuplicate = unitGroups[normalizedUnit].some(existing => 
                    existing.source === prod.source && 
                    Math.abs(existing.price - prod.price) < 0.01
                );
                
                if (!isDuplicate) {
                    unitGroups[normalizedUnit].push(prod);
                }
            });

            const sortedUnits = Object.keys(unitGroups).sort((a, b) => {
                const na = parseFloat(a), nb = parseFloat(b);
                if (!isNaN(na) && !isNaN(nb)) return na - nb;
                return a.localeCompare(b);
            });

            const variantsHTML = sortedUnits.map(unit => {
                const variants = unitGroups[unit].sort((a, b) => (Number(a.price) || 0) - (Number(b.price) || 0));
                const cheapestPrice = variants.length > 0 ? Number(variants[0].price) || 0 : 0;
                
                const pricesHTML = variants.map(p => {
                    const isCheapest = Math.abs(p.price - cheapestPrice) < 0.01;
                    const displayLabel = PLATFORM_LABELS[p.source] || p.source;
                    const sourceClass = PLATFORM_CSS[p.source] || p.source.toLowerCase().replace(/\s+/g, '');
                    const safePrice = Number(p.price) || 0;
                    const displayPrice = safePrice % 1 === 0 ? `₹${safePrice}` : `₹${safePrice.toFixed(2)}`;
                    
                    return `
                        <div class="price-row">
                            <div class="price-left">
                                <span class="source-tag ${sourceClass}">${displayLabel}</span>
                            </div>
                            <div class="price-right">
                                <span class="price-amount">
                                    ${isCheapest ? '<span class="crown-icon">👑</span>' : ''}
                                    ${displayPrice}
                                </span>
                                <span class="price-link">
                                    ${p.url ? '<a href="' + p.url + '" target="_blank">🔗</a>' : ''}
                                </span>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="variant-row">
                        <div class="variant-label">${unit}</div>
                        ${pricesHTML}
                    </div>
                `;
            }).join('');

            return `
                <div class="product-card">
                    ${group.image ? 
                        `<img src="${group.image}" alt="${group.displayName}" class="product-image" onerror="this.outerHTML='<div class=\\'product-image-placeholder\\'>No Image</div>'">` :
                        `<div class="product-image-placeholder">No Image</div>`
                    }
                    <div class="product-info">
                        <div class="product-name">${group.displayName}</div>
                        <div class="product-brand">${group.brand || 'Generic'}</div>
                        <div class="price-info">
                            ${variantsHTML}
                        </div>
                    </div>
                </div>
            `;
        }).join('')}</div>`;

        document.getElementById('resultsContainer').innerHTML = resultsHTML;
    }

    document.getElementById('locationModal').addEventListener('click', (e) => {
        if (e.target.id === 'locationModal') {
            closeLocationModal();
        }
    });
</script>
</body>
</html>
