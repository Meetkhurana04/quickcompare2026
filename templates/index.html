<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QuickCompare - Price Comparison Made Easy</title>
    <style>
        :root{
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.16);
            --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            --text: #e9ecf1;
            --muted: #a8b1c2;
            --accent1: #8b5cf6;
            --accent2: #60a5fa;
            --nav-h: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .gradient-bg {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 70%;
            height: 120%;
            background: radial-gradient(
                circle at 80% 30%,
                rgba(147, 51, 234, 0.25) 0%,
                rgba(59, 130, 246, 0.18) 25%,
                rgba(147, 51, 234, 0.06) 50%,
                transparent 70%
            );
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:1} }
        .star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            filter: blur(0.5px);
        }
        .shooting-star {
            position: absolute;
            width: 120px; height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
            transform: rotate(-25deg);
            opacity: 0;
            animation: shoot 2.2s ease-in-out forwards;
        }
        @keyframes shoot {
            0% { opacity: 0; transform: translate3d(0,0,0) rotate(-25deg); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translate3d(-60vw, 40vh, 0) rotate(-25deg); }
        }

        .background-text {
            position: fixed;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(64px, 20vw, 240px);
            font-weight: 800;
            letter-spacing: -0.02em;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            color: transparent;
            background: linear-gradient(
                to right,
                rgba(40, 40, 40, 0.5) 0%,
                rgba(80, 80, 80, 0.8) 50%,
                rgba(147, 51, 234, 0.35) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow:
                0 0 40px rgba(147, 51, 234, 0.08),
                0 0 80px rgba(147, 51, 234, 0.04);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(18px);
            -webkit-backdrop-filter: saturate(180%) blur(18px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .navbar.glass { background: rgba(15, 17, 25, 0.5); }
        .navbar h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.2px;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
            min-height: calc(100vh - 120px);
            
        }

        .hero { 
            margin-top: -15px;
            text-align: center;
            color: var(--text);
            margin-bottom: 2rem;
            transition: all 0.4s ease;
            opacity: 1;
            transform: translateY(0);
        }
        .hero h2 {
            font-size: clamp(1.6rem, 3vw, 2.5rem);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }
        .hero p {
            font-size: 1.05rem;
            color: var(--muted);
        }
        .hero.compact { 
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(-20px);
            height: 0;
            overflow: hidden;
        }

        .search-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-wrapper.compact {
            position: sticky;
            top: calc(var(--nav-h) + 8px);
            z-index: 90;
            flex-direction: row;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .search-item {
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 17, 25, 0.5);
            backdrop-filter: saturate(180%) blur(18px);
            -webkit-backdrop-filter: saturate(180%) blur(18px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            flex: 1;
        }

        .search-wrapper.compact .search-item {
            padding: 0.6rem 0.85rem;
            border-radius: 12px;
        }

        .search-wrapper.compact .search-item:first-child {
            flex: 0 0 auto;
            min-width: 200px;
        }

        .search-wrapper.compact .search-item:nth-child(2) {
            flex: 1;
        }

        .input-group {
            transition: all 0.3s ease;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 0.45rem;
            transition: all 0.3s ease;
            opacity: 1;
            max-height: 20px;
        }

        .search-wrapper.compact .input-group label {
            opacity: 0;
            max-height: 0;
            margin-bottom: 0;
            overflow: hidden;
        }

        .location-display {
            border-radius: 12px;
            padding: 0.85rem 0.9rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
        }

        .search-wrapper.compact .location-display {
            padding: 0.55rem 0.7rem;
            font-size: 0.85rem;
            border-radius: 10px;
        }

        .location-display:hover {
            border-color: rgba(102, 126, 234, 0.6);
            background: rgba(255,255,255,0.08);
        }
        .location-display.selected { background: rgba(99, 102, 241, 0.08); }
        .location-text { color: #9aa3b2; }
        .location-text.selected { color: var(--text); font-weight: 600; }

        .change-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }

        .search-wrapper.compact .change-btn {
            padding: 0.3rem 0.6rem;
            font-size: 0.75rem;
            border-radius: 6px;
        }

        .change-btn:hover { transform: translateY(-1px); }

        .search-input-row {
            display: flex;
            gap: 0.7rem;
            align-items: flex-end;
            transition: all 0.3s ease;
        }

        .search-wrapper.compact .search-input-row {
            align-items: center;
            gap: 0.5rem;
        }

        .search-input-row .input-group {
            flex: 1;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--text);
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: saturate(180%) blur(14px);
        }

        .search-wrapper.compact input[type="text"] {
            padding: 0.55rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 10px;
        }

        input[type="text"]::placeholder { color: #9aa3b2; }
        input[type="text"]:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.8);
            box-shadow: 0 0 0 4px rgba(102,126,234,0.18);
            background: rgba(255, 255, 255, 0.08);
        }
        input[type="text"]:disabled {
            background: rgba(255,255,255,0.04);
            color: #8b8f99;
            cursor: not-allowed;
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            white-space: nowrap;
        }

        .search-wrapper.compact .search-btn {
            padding: 0.55rem 1.2rem;
            font-size: 0.85rem;
            border-radius: 10px;
        }

        .search-btn:hover:not(:disabled) { transform: translateY(-2px); }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) {
            .search-wrapper.compact {
                flex-direction: column;
                gap: 0.6rem;
            }

            .search-wrapper.compact .search-item:first-child {
                min-width: auto;
            }
        }

        .modal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.25s ease;
        }
        .modal.active {
            display: flex;
            justify-content: center; align-items: center;
        }
        @keyframes fadeIn { from {opacity: 0} to {opacity: 1} }

        .modal-content {
            width: 80%;
            height: 80%;
            max-width: 900px;
            max-height: 700px;
            border-radius: 20px;
            padding: 1.5rem;
            position: relative;
            animation: slideUp 0.25s ease;
            background: rgba(15, 17, 25, 0.95);
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: saturate(180%) blur(20px);
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h3 { font-size: 1.4rem; color: var(--text); }
        .close-btn {
            background: none; border: none; font-size: 1.8rem; cursor: pointer;
            color: #a9b0be;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }

        .modal-search {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .modal-search input[type="text"] {
            width: 100%;
        }
        .suggestions {
            flex: 1;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
        }
        .suggestion-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: background 0.2s ease;
            color: var(--text);
        }
        .suggestion-item:hover {
            background: rgba(255,255,255,0.12);
        }
        .suggestion-item:last-child { border-bottom: none; }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            animation: fadeIn 0.5s ease;
        }
        @media (max-width: 768px) {
            .results { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
        }
        @media (max-width: 480px) { .results { grid-template-columns: 1fr; } }

        .product-card {
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            backdrop-filter: saturate(180%) blur(14px);
            -webkit-backdrop-filter: saturate(180%) blur(14px);
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            background: rgba(255,255,255,0.08);
        }

        .product-image {
            width: 100%; height: 200px; object-fit: cover;
            background: rgba(255,255,255,0.04);
        }
        .product-image-placeholder {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.08) 100%);
            display: flex; align-items: center; justify-content: center;
            color: #9aa3b2; font-size: 0.9rem;
        }

        .product-info { padding: 1rem; }
        .product-name {
            font-size: 0.98rem; font-weight: 700; color: var(--text);
            margin-bottom: 0.4rem;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            min-height: 40px;
        }
        .product-brand { 
            font-size: 0.82rem; 
            color: var(--muted); 
            margin-bottom: 0.8rem; 
        }

        .source-tags { display: none; }

        .source-tag {
            display: inline-block; 
            padding: 0.25rem 0.5rem; 
            border-radius: 6px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            color: white;
            mix-blend-mode: normal;
        }
        .source-tag.blinkit { background: #f8cb46; color: #333; }
        .source-tag.instamart { background: #f77f00; }
        .source-tag.zepto { background: #e21b70; }
        .source-tag.bigbasket { background: #84c225; }
        .source-tag.flipkartminutes { background: #2874f0; }
        .source-tag.jiomart { background: #0a6eb4; }
        .source-tag.dmart { background: #1c458a; }

        .price-info { 
            border-top: 1px solid rgba(255,255,255,0.08); 
            padding-top: 0.8rem; 
        }
        .variant-row { margin-bottom: 1rem; }
        .variant-label {
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #a5b4fc; 
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }
        .price-row {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0.5rem 0; 
            font-size: 0.86rem;
            gap: 0.5rem;
        }
        .price-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }
        .price-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .price-amount { 
            font-weight: 800; 
            color: #ffffff; 
            letter-spacing: 0.2px; 
        }
        .price-link { 
            text-decoration: none; 
            font-size: 1rem; 
            width: 20px;
            text-align: center;
        }

        .price-link a {
            text-decoration: none;
            color: inherit;
        }

        .crown-icon {
            font-size: 0.9rem;
            margin-left: 0.3rem;
        }

        .footer {
            position: relative;
            z-index: 2;
            margin-top: 3rem;
            text-align: center;
            padding: 1.2rem 1rem;
            border-top-left-radius: 14px; border-top-right-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 17, 25, 0.5);
            backdrop-filter: saturate(180%) blur(12px);
            color: var(--muted);
            font-size: 0.95rem;
        }
        .footer strong {
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading { text-align: center; padding: 3rem; color: var(--text); }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid white;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }

        .no-results {
            text-align: center; padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(14px);
            color: var(--muted);
        }
        .no-results h3 { margin-bottom: 0.5rem; color: var(--text); }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="background-text" id="bgText">QUICKCOMPARE</div>

    <div class="navbar glass">
        <h1>QuickCompare</h1>
    </div>

    <div class="container">
        <div class="hero" id="hero">
            <h2>Compare Prices Instantly</h2>
            <p>Find the best deals across Blinkit, Instamart, Zepto, BigBasket, and more</p>
        </div>

        <div class="search-wrapper" id="searchWrapper">
            <div class="search-item">
                <div class="input-group">
                    <label>Delivery Location</label>
                    <div class="location-display" id="locationDisplay" onclick="openLocationModal()">
                        <span class="location-text" id="locationText">Select your location</span>
                        <button class="change-btn">Select</button>
                    </div>
                </div>
            </div>

            <div class="search-item">
                <div class="search-input-row">
                    <div class="input-group">
                        <label>Search Product</label>
                        <input 
                            type="text" 
                            id="productInput" 
                            placeholder="e.g., atta, rice, milk" 
                            disabled
                        >
                    </div>
                    <button class="search-btn" id="searchBtn" onclick="searchProducts()" disabled>
                        Search
                    </button>
                </div>
            </div>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <div class="modal" id="locationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Your Location</h3>
                <button class="close-btn" onclick="closeLocationModal()">&times;</button>
            </div>
            <div class="modal-search">
                <input 
                    type="text" 
                    id="locationSearchInput" 
                    placeholder="Search for your area, sector, or landmark"
                >
                <div class="suggestions" id="locationSuggestions"></div>
            </div>
        </div>
    </div>

    <div class="footer glass">
        <p>Made with ❤️ by <strong>Meet</strong> · © <span id="year"></span> QuickCompare</p>
    </div>

    <script>
        const BACKGROUND_TEXT = 'QUICKCOMPARE';
        document.getElementById('bgText').textContent = BACKGROUND_TEXT;

        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 220; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            const dur = (2 + Math.random() * 3).toFixed(2);
            const delay = (Math.random() * 2).toFixed(2);
            star.style.animation = `twinkle ${dur}s infinite ${delay}s`;
            const size = Math.random() < 0.2 ? 3 : 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            starsContainer.appendChild(star);
        }
        setInterval(() => {
            if (Math.random() < 0.3) {
                const s = document.createElement('div');
                s.className = 'shooting-star';
                s.style.top = `${10 + Math.random() * 30}vh`;
                s.style.left = `${70 + Math.random() * 20}vw`;
                starsContainer.appendChild(s);
                setTimeout(() => s.remove(), 2400);
            }
        }, 3500);

        document.getElementById('year').textContent = new Date().getFullYear();

        window.addEventListener('load', () => {
            const navH = document.querySelector('.navbar')?.offsetHeight || 64;
            document.documentElement.style.setProperty('--nav-h', navH + 'px');
        });

        let currentLat = 28.4792711;
        let currentLng = 77.00450409999999;
        let currentPin = 122006;
        let locationSelected = false;
        let currentStoreIds = {
            instamart: '1389005',
            dmart: '10711',
            zepto: null
        };

        // Load saved location from localStorage on page load
        function loadSavedLocation() {
            try {
                const savedLocation = localStorage.getItem('quickcompare_location');
                if (savedLocation) {
                    const locationData = JSON.parse(savedLocation);
                    
                    // Restore location data
                    currentLat = locationData.lat;
                    currentLng = locationData.lng;
                    currentPin = locationData.pin;
                    
                    // Update UI
                    document.getElementById('locationText').textContent = locationData.name;
                    document.getElementById('locationText').classList.add('selected');
                    document.getElementById('locationDisplay').classList.add('selected');
                    document.querySelector('.change-btn').textContent = 'Change';
                    
                    // Enable search
                    locationSelected = true;
                    document.getElementById('productInput').disabled = false;
                    document.getElementById('searchBtn').disabled = false;
                    
                    // Fetch store IDs for the saved location
                    updateStoreIds();
                }
            } catch (e) {
                console.error('Error loading saved location:', e);
            }
        }

        // Save location to localStorage
        function saveLocation(name, lat, lng, pin) {
            try {
                const locationData = {
                    name: name,
                    lat: lat,
                    lng: lng,
                    pin: pin,
                    timestamp: Date.now()
                };
                localStorage.setItem('quickcompare_location', JSON.stringify(locationData));
            } catch (e) {
                console.error('Error saving location:', e);
            }
        }

        // Load saved location on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadSavedLocation();
        });

        function openLocationModal() {
            document.getElementById('locationModal').classList.add('active');
            document.getElementById('locationSearchInput').focus();
        }

        function closeLocationModal() {
            document.getElementById('locationModal').classList.remove('active');
            document.getElementById('locationSuggestions').innerHTML = '';
        }

        document.getElementById('locationSearchInput').addEventListener('input', async (e) => {
            const value = e.target.value.trim();
            if (value.length < 2) {
                document.getElementById('locationSuggestions').innerHTML = '';
                return;
            }

            try {
                const res = await fetch('/autocomplete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        searchWord: value,
                        location: { lat: currentLat, lng: currentLng }
                    })
                });
                const data = await res.json();
                showLocationSuggestions(data.data || []);
            } catch (e) {
                console.error('Autocomplete error:', e);
            }
        });

        function showLocationSuggestions(suggestions) {
            const container = document.getElementById('locationSuggestions');
            container.innerHTML = '';
            
            suggestions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.textContent = s.description;
                item.onclick = () => selectLocation(s);
                container.appendChild(item);
            });
        }

        async function selectLocation(selected) {
            document.getElementById('locationSearchInput').value = selected.description;
            
            try {
                const res = await fetch('/geocode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ place: selected.description })
                });
                const geo = await res.json();
                
                if (!geo.error) {
                    currentLat = geo.lat;
                    currentLng = geo.lng;
                    if (geo.postcode) currentPin = geo.postcode;
                    
                    // Save to localStorage
                    saveLocation(selected.name, currentLat, currentLng, currentPin);
                    
                    document.getElementById('locationText').textContent = selected.name;
                    document.getElementById('locationText').classList.add('selected');
                    const ld = document.getElementById('locationDisplay');
                    ld.classList.add('selected');
                    document.querySelector('.change-btn').textContent = 'Change';
                    
                    locationSelected = true;
                    document.getElementById('productInput').disabled = false;
                    document.getElementById('searchBtn').disabled = false;
                    
                    await updateStoreIds();
                    
                    setTimeout(() => {
                        closeLocationModal();
                    }, 300);
                }
            } catch (e) {
                console.error('Geocode error:', e);
            }
        }

        async function updateStoreIds() {
            try {
                const res = await fetch('/store-ids', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lat: currentLat,
                        lng: currentLng,
                        pincode: currentPin
                    })
                });
                
                if (res.ok) {
                    const storeData = await res.json();
                    if (storeData.instamart?.storeId) currentStoreIds.instamart = storeData.instamart.storeId;
                    if (storeData.dmart?.storeId) currentStoreIds.dmart = storeData.dmart.storeId;
                    if (storeData.zepto?.storeId) currentStoreIds.zepto = storeData.zepto.storeId;
                    if (storeData.jiomart) currentStoreIds.jiomart = storeData.jiomart;
                }
            } catch (e) {
                console.error('Error fetching store IDs:', e);
            }
        }

        async function searchProducts() {
            const query = document.getElementById('productInput').value.trim();
            if (!query || !locationSelected) return;

            document.getElementById('hero').classList.add('compact');
            document.getElementById('searchWrapper').classList.add('compact');

            document.getElementById('resultsContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Searching across all stores...</p>
                </div>
            `;

            try {
                const res = await fetch('/aggregate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        lat: currentLat,
                        lng: currentLng,
                        pincode: currentPin
                    })
                });

                if (!res.ok) throw new Error('Search failed');

                const data = await res.json();
                displayResults(data);
            } catch (e) {
                console.error('Search error:', e);
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="no-results">
                        <h3>Something went wrong</h3>
                        <p>Please try again</p>
                    </div>
                `;
            }
        }

        document.getElementById('productInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchProducts();
        });

        function displayResults(data) {
            let allProducts = [];

            // Parse Blinkit - Generate URL using product_id
            if (data.blinkit?.products) {
                data.blinkit.products.forEach(p => {
                    const productUrl = p.product_id ? `https://blinkit.com/prn/x/prid/${p.product_id}` : '';
                    allProducts.push({
                        source: 'Blinkit',
                        name: p.name,
                        brand: p.brand || '',
                        unit: p.unit || '',
                        price: p.price,
                        mrp: p.price,
                        image_url: p.image_url || '',
                        out_of_stock: p.inventory <= 0,
                        url: productUrl
                    });
                });
            }

            // Parse Instamart - Generate URL using product_id
            if (data.instamart?.products) {
                data.instamart.products.forEach(prod => {
                    const productUrl = prod.product_id ? `https://www.swiggy.com/instamart/item/${prod.product_id}` : '';
                    prod.variations.forEach(v => {
                        let img = '';
                        if (v.images?.length > 0) {
                            img = `https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,w_252,h_272/${v.images[0]}.png`;
                        }
                        allProducts.push({
                            source: 'Instamart',
                            name: prod.display_name,
                            brand: prod.brand || '',
                            unit: v.quantity || '',
                            price: v.price?.offer_price || 0,
                            mrp: v.price?.mrp || 0,
                            image_url: img,
                            out_of_stock: !v.inventory?.in_stock,
                            url: productUrl
                        });
                    });
                });
            }

            // Parse Zepto - Generate URL using productVariant.id
            if (data.zepto && Array.isArray(data.zepto)) {
                data.zepto.forEach(p => {
                    const price = (p.sellingPrice || 0) / 100;
                    const superPrice = (p.superSaverSellingPrice || 0) / 100;
                    const usePrice = superPrice || price;
                    let img = '';
                    if (p.productVariant?.images?.length > 0) {
                        const path = p.productVariant.images[0].path;
                        img = `https://cdn.zeptonow.com/production/tr:w-400,ar-1000-1000,pr-true,f-auto,q-80/cms/${path}`;
                    }
                    const productUrl = p.productVariant?.id ? `https://www.zepto.com/pn/x/pvid/${p.productVariant.id}` : '';
                    allProducts.push({
                        source: 'Zepto',
                        name: p.product.name,
                        brand: p.product.name.split(' ')[0] || '',
                        unit: p.productVariant?.formattedPacksize || '',
                        price: usePrice,
                        mrp: price,
                        image_url: img,
                        out_of_stock: p.outOfStock,
                        url: productUrl
                    });
                });
            }

            // Parse BigBasket
            if (data.bigbasket?.products) {
                data.bigbasket.products.forEach(p => {
                    allProducts.push({
                        source: 'BigBasket',
                        name: p.name,
                        brand: p.brand || '',
                        unit: p.unit || '',
                        price: p.price,
                        mrp: p.mrp,
                        image_url: p.image_url || '',
                        out_of_stock: p.out_of_stock,
                        url: p.url || ''
                    });
                    if (p.variants) {
                        p.variants.forEach(v => {
                            allProducts.push({
                                source: 'BigBasket',
                                name: v.name || p.name,
                                brand: p.brand || '',
                                unit: v.unit || '',
                                price: v.price,
                                mrp: v.mrp,
                                image_url: v.image_url || p.image_url,
                                out_of_stock: v.out_of_stock !== undefined ? v.out_of_stock : p.out_of_stock,
                                url: v.url || p.url || ''
                            });
                        });
                    }
                });
            }

            // Parse Flipkart Minutes
            if (data['flipkart-minutes'] && Array.isArray(data['flipkart-minutes'])) {
                data['flipkart-minutes'].forEach(p => {
                    allProducts.push({
                        source: 'Flipkart Minutes',
                        name: p.name,
                        brand: p.brand || '',
                        unit: p.quantity || '',
                        price: p.price?.offerPrice || 0,
                        mrp: p.price?.mrp || 0,
                        image_url: p.imageUrl || '',
                        out_of_stock: p.out_of_stock,
                        url: p.url || ''
                    });
                });
            }

            // Parse JioMart
            if (data.jiomart?.products) {
                data.jiomart.products.forEach(p => {
                    allProducts.push({
                        source: 'JioMart',
                        name: p.name,
                        brand: p.brand || '',
                        unit: p.unit || '',
                        price: p.price,
                        mrp: p.price,
                        image_url: p.image_url || '',
                        out_of_stock: false,
                        url: p.url || ''
                    });
                    if (p.variants) {
                        p.variants.forEach(v => {
                            allProducts.push({
                                source: 'JioMart',
                                name: v.name,
                                brand: v.brand || p.brand || '',
                                unit: v.unit || '',
                                price: v.price,
                                mrp: v.price,
                                image_url: v.image_url || p.image_url,
                                out_of_stock: false,
                                url: v.url || p.url || ''
                            });
                        });
                    }
                });
            }

            // Parse DMart
            if (data.dmart?.products) {
                data.dmart.products.forEach(p => {
                    allProducts.push({
                        source: 'DMart',
                        name: p.name,
                        brand: p.brand || '',
                        unit: p.unit || '',
                        price: p.price,
                        mrp: p.mrp,
                        image_url: p.image_url || '',
                        out_of_stock: p.out_of_stock,
                        url: p.url || ''
                    });
                    if (p.variants) {
                        p.variants.forEach(v => {
                            allProducts.push({
                                source: 'DMart',
                                name: v.name,
                                brand: v.brand || p.brand || '',
                                unit: v.unit || '',
                                price: v.price,
                                mrp: v.mrp,
                                image_url: v.image_url || p.image_url,
                                out_of_stock: v.out_of_stock,
                                url: v.url || p.url || ''
                            });
                        });
                    }
                });
            }

            const groups = groupProducts(allProducts);
            renderProductCards(groups);
        }

        function groupProducts(products) {
            const groups = {};

            products.forEach(prod => {
                const signature = extractProductSignature(prod.brand, prod.name);
                const cleanedName = cleanProductName(prod.name, prod.brand);

                if (!groups[signature]) {
                    groups[signature] = {
                        products: [],
                        sources: new Set(),
                        image: '',
                        displayName: cleanedName,
                        brand: prod.brand,
                        originalNames: [cleanedName]
                    };
                }

                groups[signature].products.push(prod);
                groups[signature].sources.add(prod.source);

                if (!groups[signature].image && prod.image_url) {
                    groups[signature].image = prod.image_url;
                }

                groups[signature].originalNames.push(cleanedName);
                const longestName = groups[signature].originalNames.reduce((a, b) => 
                    a.length > b.length ? a : b
                );
                groups[signature].displayName = longestName;
            });

            return groups;
        }

        function extractProductSignature(brand, productName) {
            const keywords = new Set();
            const name = (productName || '').toLowerCase();

            if (/\bshudh\b/.test(name) && !/\bm\.?p\.?\s+chakki\b/.test(name)) keywords.add('shudh');
            if (/\bselect\b/.test(name)) keywords.add('select');
            if (/\bpremium\b/.test(name) && !/\bselect\b/.test(name)) keywords.add('premium');
            if (/\bm\.?p\.?\s+chakki\b/.test(name)) keywords.add('mp-chakki');
            if (/\borganic\b/.test(name)) keywords.add('organic');
            if (/\bhigh\s+protein\b/.test(name)) keywords.add('high-protein');
            if (/\bmulti[-\s]?grain/i.test(name)) keywords.add('multigrain');
            if (/\bsharbati\b/.test(name)) keywords.add('sharbati');

            if (keywords.size === 0) {
                if (/\bchakki\b/.test(name)) keywords.add('chakki');
                else keywords.add('generic');
            }

            const brandKey = (brand || '').toLowerCase().trim() || 'no-brand';
            const keywordsKey = Array.from(keywords).sort().join('-');

            return `${brandKey}__${keywordsKey}`;
        }

        function cleanProductName(name, brand) {
            let cleaned = name || '';
            const fluffPatterns = [
                /\(100%\s+atta,?\s+0%\s+maida\)/gi,
                /\b0%\s+maida\b/gi,
                /\b100%\s+(wheat|atta|organic)\b/gi,
                /\bfor\s+softer\s+rotis?\b/gi,
                /\|\s*.*/g,
            ];

            fluffPatterns.forEach(pattern => {
                cleaned = cleaned.replace(pattern, '');
            });

            return cleaned.replace(/\s+/g, ' ').trim();
        }

        function renderProductCards(groups) {
            const sortedKeys = Object.keys(groups).sort((a, b) => {
                return groups[b].sources.size - groups[a].sources.size;
            });

            if (sortedKeys.length === 0) {
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="no-results">
                        <h3>No products found</h3>
                        <p>Try searching for something else</p>
                    </div>
                `;
                return;
            }

            const resultsHTML = `<div class="results">${sortedKeys.map(key => {
                const group = groups[key];
                
                const unitGroups = {};
                group.products.forEach(prod => {
                    const unitSafe = (prod.unit || 'unit').toString();
                    const normalizedUnit = unitSafe.toLowerCase().replace(/\s+/g, ' ').trim();
                    if (!unitGroups[normalizedUnit]) unitGroups[normalizedUnit] = [];
                    
                    const isDuplicate = unitGroups[normalizedUnit].some(existing => 
                        existing.source === prod.source && 
                        Math.abs(existing.price - prod.price) < 0.01
                    );
                    
                    if (!isDuplicate) {
                        unitGroups[normalizedUnit].push(prod);
                    }
                });

                const sortedUnits = Object.keys(unitGroups).sort((a, b) => {
                    const na = parseFloat(a), nb = parseFloat(b);
                    if (!isNaN(na) && !isNaN(nb)) return na - nb;
                    return a.localeCompare(b);
                });

                const variantsHTML = sortedUnits.map(unit => {
                    const variants = unitGroups[unit].sort((a, b) => (a.price || 0) - (b.price || 0));
                    const cheapestPrice = variants.length > 0 ? variants[0].price : 0;
                    
                    const pricesHTML = variants.map(p => {
                        const isCheapest = Math.abs(p.price - cheapestPrice) < 0.01;
                        const sourceClass = p.source.toLowerCase().replace(/\s+/g, '');
                        
                        return `
                            <div class="price-row">
                                <div class="price-left">
                                    <span class="source-tag ${sourceClass}">${p.source}</span>
                                </div>
                                <div class="price-right">
                                    <span class="price-amount">
                                        ${isCheapest ? '<span class="crown-icon">👑</span>' : ''}
                                        ₹${(p.price || 0).toFixed(2)}
                                    </span>
                                    <span class="price-link">
                                        ${p.url ? '<a href="' + p.url + '" target="_blank">🔗</a>' : ''}
                                    </span>
                                </div>
                            </div>
                        `;
                    }).join('');

                    return `
                        <div class="variant-row">
                            <div class="variant-label">${unit}</div>
                            ${pricesHTML}
                        </div>
                    `;
                }).join('');

                return `
                    <div class="product-card">
                        ${group.image ? 
                            `<img src="${group.image}" alt="${group.displayName}" class="product-image" onerror="this.outerHTML='<div class=\\'product-image-placeholder\\'>No Image</div>'">` :
                            `<div class="product-image-placeholder">No Image</div>`
                        }
                        <div class="product-info">
                            <div class="product-name">${group.displayName}</div>
                            <div class="product-brand">${group.brand || 'Generic'}</div>
                            <div class="price-info">
                                ${variantsHTML}
                            </div>
                        </div>
                    </div>
                `;
            }).join('')}</div>`;

            document.getElementById('resultsContainer').innerHTML = resultsHTML;
        }

        document.getElementById('locationModal').addEventListener('click', (e) => {
            if (e.target.id === 'locationModal') {
                closeLocationModal();
            }
        });
    </script>
</body>
